{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-container">
    <h1>Create an Account</h1>
    <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               pattern="[a-zA-Z0-9_]{3,30}" maxlength="30"
               title="3–30 characters: letters, digits, underscores"
               required autocomplete="username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" maxlength="254"
               required autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               minlength="8" required autocomplete="new-password">
        <small>Min 8 chars, uppercase, lowercase, digit, special character.</small>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               minlength="8" required autocomplete="new-password">

        <button type="submit">Register</button>
    </form>
    <p class="alt-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
